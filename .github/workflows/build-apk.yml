name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Permite trigger manual

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'

      - name: 📚 Get Flutter dependencies
        run: |
          cd mobile_app
          flutter clean
          flutter pub get --verbose
          
      - name: 🏗️ Build APK (Release - ARM64)
        run: |
          cd mobile_app
          echo "Starting Flutter build..."
          flutter build apk \
            --target-platform android-arm64 \
            --release \
            --verbose 2>&1 | head -n 100
          echo "Build completed!"

      - name: 📦 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: flutter-app-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 📝 Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          tag_name: apk-${{ github.run_id }}
          body: |
            ✅ APK compilado com sucesso!
            - Arquitetura: ARM64
            - Flutter: 3.32.2
            - Build: Release
            - Data: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚨 Build Failed Notification
        if: failure()
        run: |
          echo "❌ Compilação falhou. Veja os logs acima."
          exit 1
