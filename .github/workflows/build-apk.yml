name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'

      - name: 📚 Get Flutter dependencies
        run: |
          cd mobile_app
          flutter clean
          flutter pub get

      - name: 🏗️ Build APK (Release - ARM64)
        run: |
          cd mobile_app
          flutter build apk \
            --target-platform android-arm64 \
            --release

      - name: ✅ Verify APK
        run: |
          if [ -f mobile_app/build/app/outputs/flutter-apk/app-release.apk ]; then
            ls -lh mobile_app/build/app/outputs/flutter-apk/app-release.apk
            echo "APK built successfully!"
          else
            echo "APK not found!"
            exit 1
          fi

      - name: 📦 Upload APK as Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 📝 Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          tag_name: apk-${{ github.run_number }}
          body: "✅ APK Compilado com Sucesso!"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
