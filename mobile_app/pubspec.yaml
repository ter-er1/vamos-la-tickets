name: vamos_la_tickets
description: "Sistema de validação de tickets com QR Code - Android APK"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # QR Code Scanner
  mobile_scanner: ^3.5.0

  # HTTP Requests
  http: ^1.6.0
  dio: ^5.9.0

  # Database & Cache
  sqflite: ^2.4.0

  # State Management
  provider: ^6.1.0

  # Connectivity
  connectivity_plus: ^5.0.0

  # Sound
  just_audio: ^0.9.46

  # Crypto & UUID
  crypto: ^3.0.7
  uuid: ^4.0.0

  # Additional
  intl: ^0.19.0
  get: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # Assets (placeholder)
  assets:
    - assets/sounds/
    - assets/images/
